services:
  postgres:
    image: postgres:17-alpine
    container_name: identity-starter-postgres
    environment:
      POSTGRES_DB: identity_starter
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: identity_password
    ports:
      - "5433:5432"
    volumes:
      - identity-starter-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity -d identity_starter"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  identity-starter-postgres:
