spring.datasource.url=jdbc:h2:mem:identity_starter_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/h2

jwt.private-key-path=classpath:jwt/jwt-private.pem
jwt.public-key-path=classpath:jwt/jwt-public.pem
jwt.expiration=60
jwt.issuer=identity-starter-test
