spring.application.name=${SPRING_APPLICATION_NAME:identity-starter}
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/identity_starter}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:identity}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:identity_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=${SPRING_FLYWAY_LOCATIONS:classpath:db/migration/postgresql}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}

jwt.secret=${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWYwMTIzNDU2Nzg5YWJjZGVmMDEyMzQ1Njc4OWFiY2RlZg==}
jwt.expiration=${JWT_EXPIRATION_MINUTES:60}
jwt.issuer=${JWT_ISSUER:identity-starter}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

identity.rate-limit.enabled=${IDENTITY_RATE_LIMIT_ENABLED:true}
identity.rate-limit.client-ip-header=${IDENTITY_RATE_LIMIT_CLIENT_IP_HEADER:X-Forwarded-For}
identity.rate-limit.max-keys=${IDENTITY_RATE_LIMIT_MAX_KEYS:10000}
identity.rate-limit.auth-guest.limit=${IDENTITY_RATE_LIMIT_AUTH_GUEST_LIMIT:20}
identity.rate-limit.auth-guest.window=${IDENTITY_RATE_LIMIT_AUTH_GUEST_WINDOW:1h}
identity.rate-limit.auth-login.limit=${IDENTITY_RATE_LIMIT_AUTH_LOGIN_LIMIT:10}
identity.rate-limit.auth-login.window=${IDENTITY_RATE_LIMIT_AUTH_LOGIN_WINDOW:10m}
identity.rate-limit.auth-refresh.limit=${IDENTITY_RATE_LIMIT_AUTH_REFRESH_LIMIT:60}
identity.rate-limit.auth-refresh.window=${IDENTITY_RATE_LIMIT_AUTH_REFRESH_WINDOW:1h}
identity.rate-limit.user-register.limit=${IDENTITY_RATE_LIMIT_USER_REGISTER_LIMIT:5}
identity.rate-limit.user-register.window=${IDENTITY_RATE_LIMIT_USER_REGISTER_WINDOW:1h}
